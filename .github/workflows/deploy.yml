name: 部署前端

# 触发条件:推送代码到 main 分支时
on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: 📥 检出代码
        uses: actions/checkout@v4

      # 2. 将代码 SCP 推送到服务器
      - name: 📦 SCP 传输文件
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: '.,!.git,!.github'
          target: '/root/blog-ui'
          strip_components: 0
          rm: false # 不删除服务器上已有的文件(如部署脚本)

      # 3. SSH 连接到服务器并执行重启脚本
      - name: 🚀 执行部署脚本
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: bash /root/deploy-frontend.sh

      # 3. 部署成功通知
      - name: ✅ 部署完成
        run: echo "前端部署成功!"
